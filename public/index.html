<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEXACO 성격 해석기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c10;--surface:#13131a;--surface2:#1a1a24;--surface3:#20202c;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.03);
  --text:#eae8f2;--muted:#7a7890;--dim:#46445e;
  --H:#e8a87c;--E:#7ec8e3;--X:#f4d06f;--A:#a8d8a8;--C:#c3a8e8;--O:#f0a8b8;
  --gH:rgba(232,168,124,.12);--gE:rgba(126,200,227,.12);--gX:rgba(244,208,111,.12);
  --gA:rgba(168,216,168,.12);--gC:rgba(195,168,232,.12);--gO:rgba(240,168,184,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;min-height:100vh;overflow-x:hidden;line-height:1.7}
.wrap{max-width:780px;margin:0 auto;padding:64px 22px 100px}

/* Header */
header{text-align:center;margin-bottom:48px;animation:fadeDown .8s ease both}
.logo-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;margin-bottom:16px}
h1{font-size:clamp(1.9rem,5.5vw,3.3rem);font-weight:300;letter-spacing:-.02em;line-height:1.1;margin-bottom:12px}
h1 em{font-style:normal;background:linear-gradient(135deg,var(--H) 0%,var(--E) 20%,var(--X) 40%,var(--A) 60%,var(--C) 80%,var(--O) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:600}
.subtitle{font-size:.88rem;color:var(--muted);line-height:1.9;max-width:420px;margin:0 auto;font-weight:300}

/* Mode toggle */
.mode-wrap{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.mode-btn{font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.08em;padding:8px 20px;border-radius:30px;border:1px solid var(--border);background:var(--surface2);color:var(--dim);cursor:pointer;transition:all .25s}
.mode-btn.on{background:var(--surface);color:var(--text);border-color:rgba(255,255,255,.16)}
.mode-btn:hover:not(.on){color:var(--muted)}
.scale-note{text-align:center;font-family:'DM Mono',monospace;font-size:.67rem;color:var(--dim);margin-bottom:20px;letter-spacing:.04em}

/* Simple grid */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:22px}
@media(max-width:500px){.sgrid{grid-template-columns:1fr}}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .3s}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac);opacity:.65}
.scard:hover{border-color:rgba(255,255,255,.1)}
.scard-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.scard-letter{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;color:var(--ac);width:26px}
.scard-name{font-size:.82rem;font-weight:600;letter-spacing:.03em}
.scard-en{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--dim);margin-top:2px}
.sinput-row{display:flex;align-items:center;gap:10px}

/* Detail blocks */
.dblock{background:var(--surface);border:1px solid var(--border);border-radius:18px;margin-bottom:13px;overflow:hidden}
.dblock-hdr{display:flex;align-items:center;gap:13px;padding:17px 20px;cursor:pointer;user-select:none;transition:background .2s}
.dblock-hdr:hover{background:rgba(255,255,255,.015)}
.dblock-letter{font-family:'DM Mono',monospace;font-size:1.35rem;font-weight:500;width:26px;flex-shrink:0}
.dblock-info{flex:1}
.dblock-name{font-size:.88rem;font-weight:600;letter-spacing:.02em;margin-bottom:1px}
.dblock-en{font-family:'DM Mono',monospace;font-size:.64rem;color:var(--dim)}
.dblock-score{font-family:'DM Mono',monospace;font-size:.82rem;color:var(--dim);flex-shrink:0}
.dblock-chev{font-size:.7rem;color:var(--dim);transition:transform .3s;flex-shrink:0}
.dblock.open .dblock-chev{transform:rotate(180deg)}
.dtotal-row{display:flex;align-items:center;gap:12px;padding:0 20px 14px;border-bottom:1px solid var(--border2)}
.dtotal-lbl{font-size:.74rem;color:var(--muted);flex:1;line-height:1.5}
.dtotal-lbl small{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--dim);display:block;margin-top:1px}
.facets-wrap{display:none;padding:14px 20px 18px;gap:9px;flex-direction:column}
.dblock.open .facets-wrap{display:flex}
.frow{display:flex;align-items:center;gap:12px}
.frow-lbl{flex:1;font-size:.77rem;color:var(--muted);line-height:1.4}
.frow-lbl span{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);display:block;margin-top:1px}

/* Inputs */
input[type=number]{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Mono',monospace;font-size:1rem;padding:7px 11px;outline:none;transition:border-color .2s,box-shadow .2s;-moz-appearance:textfield;width:68px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]:focus{border-color:var(--ac,#7ec8e3);box-shadow:0 0 0 2px var(--gc,rgba(126,200,227,.12))}
.fin{width:60px;font-size:.88rem;background:var(--surface3);border-color:var(--border2)}
.rng{font-family:'DM Mono',monospace;font-size:.66rem;color:var(--dim)}

/* Submit */
.submit-wrap{text-align:center;margin:28px 0 48px}
.btn-go{background:linear-gradient(135deg,#22222e,#1a1a24);border:1px solid rgba(255,255,255,.11);border-radius:50px;color:var(--text);font-family:'Noto Serif KR',serif;font-size:.93rem;padding:15px 46px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.btn-go::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--H),var(--E),var(--X),var(--A),var(--C),var(--O));opacity:0;transition:opacity .3s;border-radius:50px}
.btn-go:hover::after{opacity:.09}
.btn-go:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,.5);border-color:rgba(255,255,255,.2)}
.err{text-align:center;color:#f08080;font-size:.78rem;margin-top:10px;min-height:18px;font-family:'DM Mono',monospace}

/* Result */
#result{display:none}
.res-hdr{text-align:center;margin-bottom:36px}
.res-tag{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.res-h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:300;letter-spacing:-.02em}

/* Bars */
.bar-row{display:grid;grid-template-columns:110px 1fr 48px;align-items:center;gap:12px;margin-bottom:9px}
.bar-lbl{text-align:right;font-size:.72rem;color:var(--muted)}
.bar-lbl strong{font-family:'DM Mono',monospace;font-size:.8rem;display:block}
.bar-track{height:7px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;width:0%;transition:width 1.1s cubic-bezier(.4,0,.2,1)}
.bar-val{font-family:'DM Mono',monospace;font-size:.8rem;text-align:right}
.fbar-group{padding-left:122px;margin-bottom:10px;display:grid;gap:4px}
.fbar-row{display:grid;grid-template-columns:90px 1fr 38px;align-items:center;gap:8px}
.fbar-lbl{font-size:.64rem;color:var(--dim);text-align:right}
.fbar-track{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden}
.fbar-fill{height:100%;border-radius:2px;width:0%;transition:width 1.2s cubic-bezier(.4,0,.2,1);opacity:.65}
.fbar-val{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--dim);text-align:right}

/* Cards */
.overall-card{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:34px 30px;margin:28px 0 14px;position:relative;overflow:hidden}
.overall-card::after{content:'';position:absolute;bottom:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(126,200,227,.05) 0%,transparent 70%);pointer-events:none}
.sec-eyebrow{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
.overall-text{font-size:.97rem;color:var(--muted);line-height:2.05;font-weight:300}
.overall-text strong,.interaction-text strong{color:var(--text);font-weight:600}
.interaction-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:14px}
.interaction-text{font-size:.9rem;color:var(--muted);line-height:2;font-weight:300}
.section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin:28px 0 14px}
.dim-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 28px 24px;margin-bottom:14px;position:relative;overflow:hidden}
.dim-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--ac);border-radius:4px 0 0 4px}
.dim-card::after{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,var(--gc) 0%,transparent 70%);pointer-events:none}
.dim-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:12px}
.dim-card-title{font-size:1.05rem;font-weight:600}
.dim-badge{font-family:'DM Mono',monospace;font-size:.65rem;padding:4px 11px;border-radius:20px;background:var(--gc);color:var(--ac);white-space:nowrap;flex-shrink:0;margin-top:2px}
.dim-body{font-size:.9rem;color:var(--muted);line-height:2;font-weight:300}
.dim-body strong{color:var(--text);font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{font-family:'DM Mono',monospace;font-size:.63rem;padding:3px 9px;border-radius:12px;background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
.everyday-box{margin-top:18px;padding:16px 18px;background:var(--surface2);border-radius:12px;border:1px solid var(--border2)}
.everyday-title{font-family:'DM Mono',monospace;font-size:.64rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
.everyday-list{display:grid;gap:7px}
.everyday-item{display:flex;gap:10px;align-items:flex-start}
.everyday-dot{width:5px;height:5px;border-radius:50%;margin-top:8px;flex-shrink:0;opacity:.7}
.everyday-text{font-size:.84rem;color:var(--muted);line-height:1.75}
.facet-detail-list{margin-top:16px;padding-top:16px;border-top:1px solid var(--border2);display:grid;gap:10px}
.fdet-item{display:flex;gap:10px;align-items:flex-start}
.fdet-score{font-family:'DM Mono',monospace;font-size:.7rem;width:36px;flex-shrink:0;padding-top:2px;text-align:right}
.fdet-name{font-size:.78rem;font-weight:600;color:var(--text);margin-bottom:2px}
.fdet-text{font-size:.8rem;color:var(--muted);line-height:1.7}

/* Loading */
.loading-wrap{text-align:center;padding:56px 0}
.loading-label{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.2em;color:var(--dim);margin-bottom:20px;text-transform:uppercase}
.dots{display:flex;justify-content:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:pulse 1.3s ease infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}

.btn-reset{display:block;margin:40px auto 0;background:none;border:1px solid var(--border);border-radius:50px;color:var(--dim);font-family:'DM Mono',monospace;font-size:.7rem;letter-spacing:.1em;padding:11px 30px;cursor:pointer;transition:all .3s}
.btn-reset:hover{color:var(--muted);border-color:rgba(255,255,255,.14)}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo-tag">Personality Analysis · HEXACO</div>
  <h1>나는 <em>어떤 사람</em>일까</h1>
  <p class="subtitle">점수를 입력하면 AI가 점수들의 조합을 유기적으로 분석해<br>일상에서 내가 어떻게 보이는지 구체적으로 해석해 드려요</p>
</header>

<!-- INPUT SECTION -->
<div id="input-section">
  <div class="mode-wrap">
    <button class="mode-btn on" id="btn-s" onclick="setMode('s')">간단 (6항목)</button>
    <button class="mode-btn" id="btn-d" onclick="setMode('d')">세부 (24항목)</button>
  </div>
  <p class="scale-note">검사 결과의 점수를 그대로 입력하세요 (1.00 – 5.00)</p>

  <div id="mode-s"><div class="sgrid" id="sgrid"></div></div>
  <div id="mode-d" style="display:none"><div id="dblocks"></div></div>

  <div class="submit-wrap">
    <button class="btn-go" onclick="analyze()">✦ 해석 시작하기</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- RESULT SECTION -->
<div id="result">
  <div class="res-hdr">
    <div class="res-tag">Your HEXACO Profile</div>
    <div class="res-h1">성격 분석 결과</div>
  </div>
  <div id="bars"></div>
  <div class="loading-wrap" id="loading">
    <div class="loading-label">AI가 당신의 성격을 분석하고 있어요</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <div id="ai-out" style="display:none"></div>
  <button class="btn-reset" onclick="reset()" style="display:none" id="btn-reset">↺ 다시 입력하기</button>
</div>

</div>
<script>
// ══════════════════════════════════════
// DATA
// ══════════════════════════════════════
const DIMS=[
  {key:'H',name:'정직-겸손',en:'Honesty-Humility',color:'#e8a87c',gc:'rgba(232,168,124,.12)'},
  {key:'E',name:'정서성',en:'Emotionality',color:'#7ec8e3',gc:'rgba(126,200,227,.12)'},
  {key:'X',name:'외향성',en:'eXtraversion',color:'#f4d06f',gc:'rgba(244,208,111,.12)'},
  {key:'A',name:'원만성',en:'Agreeableness',color:'#a8d8a8',gc:'rgba(168,216,168,.12)'},
  {key:'C',name:'성실성',en:'Conscientiousness',color:'#c3a8e8',gc:'rgba(195,168,232,.12)'},
  {key:'O',name:'개방성',en:'Openness',color:'#f0a8b8',gc:'rgba(240,168,184,.12)'},
];
const FACETS={
  H:[{key:'Hs',name:'성실성',en:'Sincerity'},{key:'Hf',name:'공정성',en:'Fairness'},{key:'Hg',name:'탐욕 회피',en:'Greed Avoidance'},{key:'Hm',name:'겸손',en:'Modesty'}],
  E:[{key:'Ef',name:'두려움',en:'Fearfulness'},{key:'Ea',name:'불안',en:'Anxiety'},{key:'Ed',name:'의존성',en:'Dependence'},{key:'Es',name:'감수성',en:'Sentimentality'}],
  X:[{key:'Xs',name:'사회적 자존감',en:'Social Self-Esteem'},{key:'Xb',name:'사회적 대담성',en:'Social Boldness'},{key:'Xso',name:'사교성',en:'Sociability'},{key:'Xl',name:'활기',en:'Liveliness'}],
  A:[{key:'Af',name:'관용',en:'Forgiveness'},{key:'Ag',name:'온화함',en:'Gentleness'},{key:'Ax',name:'유연성',en:'Flexibility'},{key:'Ap',name:'인내심',en:'Patience'}],
  C:[{key:'Co',name:'체계성',en:'Organization'},{key:'Cd',name:'근면성',en:'Diligence'},{key:'Cp',name:'완벽주의',en:'Perfectionism'},{key:'Cpr',name:'신중성',en:'Prudence'}],
  O:[{key:'Oa',name:'심미성',en:'Aesthetic Appreciation'},{key:'Oi',name:'호기심',en:'Inquisitiveness'},{key:'Ocr',name:'창의성',en:'Creativity'},{key:'Ouc',name:'비관습성',en:'Unconventionality'}],
};

function lvl(s){if(s>=4.5)return'매우 높음';if(s>=3.8)return'높음';if(s>=3.2)return'평균';if(s>=2.5)return'낮음';return'매우 낮음';}
function md(t){return(t||'').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');}

// ══════════════════════════════════════
// BUILD UI
// ══════════════════════════════════════
let mode='s', scores={}, facetScores={};

(function buildSimple(){
  const g=document.getElementById('sgrid');
  DIMS.forEach(d=>{
    const c=document.createElement('div');
    c.className='scard';
    c.style.cssText=`--ac:${d.color};--gc:${d.gc}`;
    c.innerHTML=`<div class="scard-head"><div class="scard-letter">${d.key}</div><div><div class="scard-name">${d.name}</div><div class="scard-en">${d.en}</div></div></div>
    <div class="sinput-row"><input type="number" id="s-${d.key}" min="1" max="5" step="0.01" placeholder="3.50" style="--ac:${d.color};--gc:${d.gc}" oninput="scores['${d.key}']=parseFloat(this.value)"><span class="rng">1–5</span></div>`;
    g.appendChild(c);
  });
})();

(function buildDetail(){
  const container=document.getElementById('dblocks');
  DIMS.forEach(d=>{
    const b=document.createElement('div');
    b.className='dblock';b.id='db-'+d.key;
    const frows=FACETS[d.key].map(f=>`
      <div class="frow">
        <div class="frow-lbl">${f.name}<span>${f.en}</span></div>
        <input type="number" class="fin" id="f-${f.key}" min="1" max="5" step="0.01" placeholder="–"
          style="--ac:${d.color};--gc:${d.gc}" oninput="onFacet('${d.key}','${f.key}',this.value)">
      </div>`).join('');
    b.innerHTML=`
      <div class="dblock-hdr" onclick="toggleDim('${d.key}')">
        <div class="dblock-letter" style="color:${d.color}">${d.key}</div>
        <div class="dblock-info"><div class="dblock-name">${d.name}</div><div class="dblock-en">${d.en}</div></div>
        <div class="dblock-score" id="ds-${d.key}">—</div>
        <div class="dblock-chev">▼</div>
      </div>
      <div class="dtotal-row" style="--ac:${d.color};--gc:${d.gc}">
        <div class="dtotal-lbl">전체 점수<small>세부 입력 시 자동 계산</small></div>
        <input type="number" id="d-${d.key}" min="1" max="5" step="0.01" placeholder="3.50"
          style="--ac:${d.color};--gc:${d.gc}" oninput="scores['${d.key}']=parseFloat(this.value);document.getElementById('ds-${d.key}').textContent=this.value||'—'">
        <span class="rng">1–5</span>
      </div>
      <div class="facets-wrap" style="--ac:${d.color};--gc:${d.gc}">${frows}</div>`;
    container.appendChild(b);
  });
})();

function toggleDim(k){document.getElementById('db-'+k).classList.toggle('open')}
function onFacet(dimKey,fKey,val){
  if(!facetScores[dimKey])facetScores[dimKey]={};
  const v=parseFloat(val);
  if(!isNaN(v)&&v>=1&&v<=5)facetScores[dimKey][fKey]=v; else delete facetScores[dimKey][fKey];
  const vals=Object.values(facetScores[dimKey]).filter(x=>x>=1&&x<=5);
  if(vals.length){
    const avg=(vals.reduce((a,b)=>a+b,0)/vals.length);
    scores[dimKey]=Math.round(avg*100)/100;
    document.getElementById('d-'+dimKey).value=scores[dimKey].toFixed(2);
    document.getElementById('ds-'+dimKey).textContent=scores[dimKey].toFixed(2);
  }
}
function setMode(m){
  mode=m;
  document.getElementById('btn-s').classList.toggle('on',m==='s');
  document.getElementById('btn-d').classList.toggle('on',m==='d');
  document.getElementById('mode-s').style.display=m==='s'?'':'none';
  document.getElementById('mode-d').style.display=m==='d'?'':'none';
  document.getElementById('err').textContent='';
}

// ══════════════════════════════════════
// VALIDATE
// ══════════════════════════════════════
function validate(){
  for(const d of DIMS){
    const v=scores[d.key];
    if(!v||isNaN(v)||v<1||v>5){
      document.getElementById('err').textContent=`${d.name}(${d.key}) 점수를 1~5 사이로 입력해주세요.`;
      return false;
    }
  }
  document.getElementById('err').textContent='';
  return true;
}

// ══════════════════════════════════════
// BARS
// ══════════════════════════════════════
let savedScores={},savedFacets={};

function renderBars(sc,fc){
  const c=document.getElementById('bars');c.innerHTML='';
  DIMS.forEach((d,i)=>{
    const hasFacets=fc[d.key]&&Object.keys(fc[d.key]).length>0;
    const wrap=document.createElement('div');
    wrap.style.cssText=`margin-bottom:${hasFacets?'4px':'10px'};animation:slideIn .5s ${i*.07}s ease both`;
    wrap.innerHTML=`<div class="bar-row">
      <div class="bar-lbl"><strong style="color:${d.color}">${d.key}</strong>${d.name}</div>
      <div class="bar-track"><div class="bar-fill" id="bf-${d.key}" style="background:${d.color}"></div></div>
      <div class="bar-val" style="color:${d.color}">${sc[d.key].toFixed(2)}</div>
    </div>`;
    if(hasFacets){
      const fg=document.createElement('div');fg.className='fbar-group';
      FACETS[d.key].forEach(f=>{
        const fv=fc[d.key][f.key];if(fv===undefined)return;
        const row=document.createElement('div');row.className='fbar-row';
        row.innerHTML=`<div class="fbar-lbl">${f.name}</div><div class="fbar-track"><div class="fbar-fill" data-w="${((fv-1)/4*100).toFixed(1)}" style="background:${d.color}"></div></div><div class="fbar-val">${fv.toFixed(2)}</div>`;
        fg.appendChild(row);
      });
      wrap.appendChild(fg);
    }
    c.appendChild(wrap);
  });
  setTimeout(()=>{
    DIMS.forEach(d=>{const el=document.getElementById('bf-'+d.key);if(el)el.style.width=((sc[d.key]-1)/4*100)+'%';});
    document.querySelectorAll('.fbar-fill').forEach(el=>el.style.width=el.dataset.w+'%');
  },120);
}

// ══════════════════════════════════════
// RENDER RESULT
// ══════════════════════════════════════
function renderAI(data){
  const out=document.getElementById('ai-out');
  out.innerHTML='';

  // Overall
  const oc=document.createElement('div');oc.className='overall-card';
  oc.innerHTML=`<div class="sec-eyebrow">Overall Profile</div><div class="overall-text">${md(data.overall)}</div>`;
  out.appendChild(oc);

  // Interaction
  if(data.interaction){
    const ic=document.createElement('div');ic.className='interaction-card';
    ic.innerHTML=`<div class="sec-eyebrow">차원 간 상호작용</div><div class="interaction-text">${md(data.interaction)}</div>`;
    out.appendChild(ic);
  }

  // Section title
  const st=document.createElement('div');st.className='section-title';st.textContent='차원별 상세 분석';
  out.appendChild(st);

  // Dim cards
  DIMS.forEach((d,i)=>{
    const info=data.dimensions?.[d.key];if(!info)return;
    const dc=document.createElement('div');
    dc.className='dim-card';
    dc.style.cssText=`--ac:${d.color};--gc:${d.gc};animation:fadeUp .6s ${i*.08}s ease both`;

    const everyday=(info.everyday||[]).map(e=>`
      <div class="everyday-item">
        <div class="everyday-dot" style="background:${d.color}"></div>
        <div class="everyday-text">${e}</div>
      </div>`).join('');

    const chips=(info.chips||[]).map(c=>`<span class="chip">${c}</span>`).join('');

    let facetHTML='';
    const fd=data.facets?.[d.key];
    if(fd){
      const items=FACETS[d.key].map(f=>{
        const fv=(savedFacets[d.key]||{})[f.key];
        const ftxt=fd[f.key];
        if(!ftxt&&fv===undefined)return'';
        return`<div class="fdet-item">
          <div class="fdet-score" style="color:${d.color}">${fv!==undefined?fv.toFixed(2):''}</div>
          <div><div class="fdet-name">${f.name}</div><div class="fdet-text">${ftxt||''}</div></div>
        </div>`;
      }).filter(Boolean).join('');
      if(items)facetHTML=`<div class="facet-detail-list">${items}</div>`;
    }

    dc.innerHTML=`
      <div class="dim-card-top">
        <div class="dim-card-title" style="color:${d.color}">${d.key} · ${d.name}</div>
        <div class="dim-badge">${lvl(savedScores[d.key])} · ${savedScores[d.key].toFixed(2)}</div>
      </div>
      <div class="dim-body">${md(info.core)}</div>
      <div class="chips">${chips}</div>
      <div class="everyday-box">
        <div class="everyday-title">일상에서 이렇게 보여요</div>
        <div class="everyday-list">${everyday}</div>
      </div>
      ${facetHTML}`;
    out.appendChild(dc);
  });
}

// ══════════════════════════════════════
// MAIN
// ══════════════════════════════════════
async function analyze(){
  if(!validate())return;

  // snapshot
  savedScores={};savedFacets={};
  DIMS.forEach(d=>{
    savedScores[d.key]=Math.round(scores[d.key]*100)/100;
    if(mode==='d'&&facetScores[d.key]){
      savedFacets[d.key]={};
      Object.entries(facetScores[d.key]).forEach(([k,v])=>{
        if(v>=1&&v<=5)savedFacets[d.key][k]=Math.round(v*100)/100;
      });
    }
  });

  document.getElementById('input-section').style.display='none';
  const result=document.getElementById('result');
  result.style.display='block';
  result.style.animation='fadeUp .7s ease both';
  document.getElementById('loading').style.display='block';
  document.getElementById('ai-out').style.display='none';
  document.getElementById('btn-reset').style.display='none';
  renderBars(savedScores,savedFacets);
  window.scrollTo({top:0,behavior:'smooth'});

  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({scores:savedScores,facets:savedFacets}),
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'오류가 발생했어요');
    document.getElementById('loading').style.display='none';
    document.getElementById('ai-out').style.display='block';
    document.getElementById('btn-reset').style.display='block';
    renderAI(data);
  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="color:#f08080;font-family:'DM Mono',monospace;font-size:.82rem;text-align:center">${e.message}</div>`;
    document.getElementById('btn-reset').style.display='block';
  }
}

function reset(){
  document.getElementById('result').style.display='none';
  document.getElementById('input-section').style.display='block';
  scores={};facetScores={};
  DIMS.forEach(d=>{
    const si=document.getElementById('s-'+d.key);if(si)si.value='';
    const di=document.getElementById('d-'+d.key);if(di){di.value='';document.getElementById('ds-'+d.key).textContent='—';}
    (FACETS[d.key]||[]).forEach(f=>{const fi=document.getElementById('f-'+f.key);if(fi)fi.value='';});
    const db=document.getElementById('db-'+d.key);if(db)db.classList.remove('open');
  });
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('input-section').style.display!=='none')analyze();
});
</script>
